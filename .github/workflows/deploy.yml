name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: sakila-app:${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
      - name: Write Job Summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
      - name: Notify
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          echo "Image: sakila-app:${{ github.sha }}"
      - name: Create GitHub Release
        run: |
          echo "Creating release v${{ github.run_number }}"
          gh release create "v${{ github.run_number }}" \
            --title "Release v${{ github.run_number }}" \
            --notes "Automated production deployment" || echo "Release already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify
        run: echo "Slack notification: Deployment to production successful"